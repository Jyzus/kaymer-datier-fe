services:
  erd-diagram:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - erd-data:/app/data
    environment:
      - PORT=3000
      - DB_PROVIDER=sqlite
      - DATABASE_URL=file:/app/data/local.db
      - AI_PROVIDER=openai
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-mini
    restart: unless-stopped

volumes:
  erd-data:

